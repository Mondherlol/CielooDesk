<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hors ligne — CielooDesk</title>
    <script type="module" src="/src/offline.ts"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #f1f5ff;
        display: flex; align-items: center; justify-content: center;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadein { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

      .card {
        background: #fff;
        border-radius: 22px;
        padding: 44px 48px 40px;
        box-shadow: 0 12px 48px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
        display: flex; flex-direction: column; align-items: center; gap: 14px;
        max-width: 380px; width: calc(100% - 40px);
        animation: fadein .3s ease;
      }

      .icon-wrap {
        width: 80px; height: 80px; border-radius: 50%;
        background: linear-gradient(135deg, #fee2e2 0%, #fef3c7 100%);
        display: flex; align-items: center; justify-content: center;
        color: #ef4444; flex-shrink: 0;
      }
      .icon-wrap svg { width: 38px; height: 38px; }

      .logo {
        width: 28px; height: 28px; border-radius: 7px;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        display: flex; align-items: center; justify-content: center;
        font-size: .95rem; font-weight: 800; color: #fff;
        flex-shrink: 0;
      }

      h1 {
        color: #111827; font-size: 1.25rem; font-weight: 800;
        letter-spacing: -.02em; margin: 0; text-align: center;
      }
      p {
        color: #6b7280; font-size: .875rem;
        text-align: center; line-height: 1.65; margin: 0; max-width: 270px;
      }

      .countdown-row {
        display: flex; align-items: center; gap: 6px;
        color: #9ca3af; font-size: .82rem;
      }
      #ol-num {
        font-weight: 700; color: #6b7280;
        font-variant-numeric: tabular-nums; min-width: 2ch; text-align: right;
      }
      #ol-spinner {
        width: 14px; height: 14px;
        border: 2px solid rgba(59,130,246,.2); border-top-color: #3b82f6;
        border-radius: 50%; animation: spin .65s linear infinite;
        display: none; flex-shrink: 0;
      }

      #ol-status {
        font-size: .8rem; text-align: center;
        min-height: 1.1em; color: #9ca3af; transition: color .2s;
      }
      #ol-status.err  { color: #ef4444; }
      #ol-status.ok   { color: #10b981; }

      button {
        width: 100%; padding: 13px 24px; margin-top: 4px;
        background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff;
        border: none; border-radius: 11px; font-size: .93rem; font-weight: 700;
        cursor: pointer; font-family: inherit;
        box-shadow: 0 3px 14px rgba(59,130,246,.32);
        transition: filter .15s, transform .15s, box-shadow .15s;
        display: flex; align-items: center; justify-content: center; gap: 8px;
      }
      button:hover:not(:disabled) {
        filter: brightness(1.08); transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(59,130,246,.42);
      }
      button:active:not(:disabled) { transform: translateY(0); filter: brightness(.97); }
      button:disabled { opacity: .6; cursor: not-allowed; transform: none; filter: none; }

      .brand-row {
        display: flex; align-items: center; gap: 6px;
        margin-bottom: 4px;
      }
      .brand-name { font-size: .8rem; color: #9ca3af; font-weight: 500; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand-row">
        <div class="logo">C</div>
        <span class="brand-name">CielooDesk</span>
      </div>

      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      </div>

      <h1>Connexion perdue</h1>
      <p>Vérifiez votre connexion Wi-Fi ou Ethernet et réessayez.</p>

      <div class="countdown-row">
        <div id="ol-spinner"></div>
        <span id="ol-label">Nouvelle tentative dans</span>
        <span id="ol-num">30</span><span>s</span>
      </div>

      <div id="ol-status"></div>

      <button id="ol-retry">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Réessayer maintenant
      </button>
    </div>
  </body>
</html>
