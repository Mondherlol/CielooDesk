<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'none'; img-src 'self' data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacter le support — CielooPos</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #f0f4ff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 50%, #3b82f6 100%);
      padding: 22px 24px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 60%, rgba(99,102,241,.3) 0%, transparent 55%);
      pointer-events: none;
    }
    .header-logo {
      width: 52px; height: 52px;
      border-radius: 14px;
      object-fit: cover;
      position: relative;
      box-shadow: 0 4px 14px rgba(0,0,0,.2);
    }
    .header-title {
      color: #fff;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -.025em;
      position: relative;
    }
    .header-subtitle {
      color: rgba(255,255,255,.68);
      font-size: .78rem;
      position: relative;
    }

    /* ── Cards ── */
    .cards {
      flex: 1;
      padding: 0 16px 16px;
      margin-top: -18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    .section-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: #9ca3af;
      padding: 6px 2px 0;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(37,99,235,.08), 0 6px 20px rgba(37,99,235,.07);
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      border: 1.5px solid rgba(37,99,235,.07);
      transition: transform .15s, box-shadow .15s;
      cursor: default;
    }
    a.card { cursor: pointer; }
    a.card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(37,99,235,.13), 0 8px 28px rgba(37,99,235,.1);
    }

    .card-icon {
      width: 40px; height: 40px;
      border-radius: 11px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .card-icon.blue { background: linear-gradient(135deg,#eff6ff,#dbeafe); color: #2563eb; }
    .card-icon.green { background: linear-gradient(135deg,#f0fdf4,#dcfce7); color: #16a34a; }

    .card-body { flex: 1; min-width: 0; }
    .card-label {
      font-size: .65rem; font-weight: 600;
      letter-spacing: .07em; text-transform: uppercase;
      color: #9ca3af; margin-bottom: 2px;
    }
    .card-value {
      font-size: .92rem; font-weight: 700;
      color: #111827; letter-spacing: -.01em;
      display: flex; align-items: center; gap: 6px;
    }
    .card-sub { font-size: .72rem; color: #6b7280; margin-top: 1px; }

    .card-arrow { color: #d1d5db; flex-shrink: 0; transition: color .15s, transform .15s; }
    a.card:hover .card-arrow { color: #2563eb; transform: translateX(2px); }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #f0fdf4; color: #16a34a;
      border: 1px solid #bbf7d0;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: .68rem; font-weight: 600;
      margin-top: 4px;
    }
    .badge-dot { width: 5px; height: 5px; background: #22c55e; border-radius: 50%; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 8px 16px 14px;
      color: #9ca3af;
      font-size: .7rem;
      flex-shrink: 0;
    }
    .footer strong { color: #6b7280; font-weight: 600; }
  </style>
</head>
<body>

  <div class="header">
    <img class="header-logo" src="/512_rounded.png" alt="CielooPos" />
    <div class="header-title">Contacter le support</div>
    <div class="header-subtitle">Notre équipe est là pour vous aider</div>
  </div>

  <div class="cards">

    <div class="section-label">Coordonnées</div>

    <a class="card" href="mailto:cieloo.erp@gmail.com">
      <div class="card-icon blue">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-label">E-mail</div>
        <div class="card-value">cieloo.erp@gmail.com</div>
        <div class="card-sub">Réponse sous 24h ouvrées</div>
      </div>
      <svg class="card-arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>

    <div class="card">
      <div class="card-icon green">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-label">Téléphone</div>
        <div class="card-value"><span>🇹🇳</span>(+216) 22 123 456</div>
        <div class="card-sub">Lun – Ven · 8h00 – 18h00</div>
      </div>
    </div>

    <div class="section-label">Disponibilité</div>

    <div class="card">
      <div class="card-icon blue">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-label">Horaires</div>
        <div class="card-value">Lun – Ven · 8h – 18h</div>
        <div class="badge"><span class="badge-dot"></span>Support disponible</div>
      </div>
    </div>

  </div>

  <div class="footer">
    <strong>CielooPos</strong> · Support technique
  </div>

</body>
</html>
