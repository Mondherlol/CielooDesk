appId: io.cieloo.cieloodesk
productName: CielooDesk
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - from: assets
    to: assets
    filter:
      - SumatraPDF.exe
      - SumatraPDF-settings.txt
win:
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
